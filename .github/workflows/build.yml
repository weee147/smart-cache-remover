name: Build Executable

on:
  push:
    branches: [ "main" ] # Si attiva ogni volta che fai un push sul branch main
  workflow_dispatch: # Ti permette anche di avviarlo manualmente

jobs:
  build:
    runs-on: windows-latest # Usa una macchina virtuale Windows

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --onefile --noconsole cleaner.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Windows-Cleaner-EXE
        path: dist/cleaner.exe
